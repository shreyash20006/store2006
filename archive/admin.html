<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Escape Clothing</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Supabase Setup -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = 'https://cunnehaehvzkprhjqrwx.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1bm5laGFlaHZ6a3ByaGpxcnd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDAxNDIsImV4cCI6MjA5NjU3NjE0Mn0.EDmqQwczUk7PjONlSjTNfstacQf_DZ9R1PQeXVHGCok';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
  </script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: '#131313',
            surface: '#1A1A1A',
            border: '#444748',
            accent: '#FF3B30',
          },
          fontFamily: {
            heading: ['"Bebas Neue"', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #131313; color: white; font-family: 'Inter', sans-serif; }
    /* Hide scrollbar for clean look */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    input, select, textarea {
      background-color: #1A1A1A;
      border: 1px solid #444748;
      color: white;
      padding: 0.5rem;
      border-radius: 0.25rem;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #FF3B30;
    }
    label { font-size: 0.875rem; color: #8e9192; margin-bottom: 0.25rem; display: block; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    
    .modal, .overlay { display: none; }
    .modal.active, .overlay.active { display: flex; }
  </style>
</head>
<body class="flex h-screen overflow-hidden">

  <!-- Login Overlay -->
  <div id="loginOverlay" class="overlay active fixed inset-0 z-[100] bg-[#131313] items-center justify-center p-4 flex">
    <div class="bg-surface border border-border w-full max-w-md p-8 flex flex-col rounded-sm shadow-2xl">
      <h1 class="font-heading text-4xl text-center mb-2">ADMIN LOGIN</h1>
      <p class="text-center text-gray-400 text-sm mb-6">Escape Clothing Dashboard</p>
      
      <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
        <div>
          <label>Email</label>
          <input type="email" id="loginEmail" required value="admin@escapeclothing.shop">
        </div>
        <div>
          <label>Password</label>
          <input type="password" id="loginPassword" required>
        </div>
        <p id="loginError" class="text-red-500 text-sm hidden"></p>
        <button type="submit" id="loginBtn" class="w-full bg-accent text-white py-3 rounded-sm font-bold uppercase tracking-wider hover:bg-red-600 transition-colors mt-4">
          Login
        </button>
      </form>
    </div>
  </div>

  <!-- Sidebar -->
  <aside class="w-64 bg-surface border-r border-border flex flex-col hidden md:flex">
    <div class="p-6 border-b border-border">
      <h1 class="font-heading text-3xl tracking-wide">ESCAPE ADMIN</h1>
    </div>
    <nav class="flex-1 p-4 space-y-2">
      <a href="#" class="flex items-center gap-3 px-4 py-3 bg-accent text-white rounded-sm font-semibold text-sm">
        <span class="material-symbols-outlined">inventory_2</span> Products
      </a>
      <!-- Add more nav items here later (Orders, etc) -->
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="h-16 border-b border-border flex items-center justify-between px-6 bg-surface/50 backdrop-blur-md">
      <h2 class="font-heading text-2xl">Products</h2>
      <div class="flex items-center gap-4">
        <button onclick="openModal()" class="bg-white text-black px-4 py-2 text-sm font-bold uppercase tracking-wider rounded-sm hover:bg-gray-200 flex items-center gap-2">
          <span class="material-symbols-outlined text-lg">add</span> Add Product
        </button>
        <button onclick="handleLogout()" class="text-gray-400 hover:text-white" title="Logout">
          <span class="material-symbols-outlined">logout</span>
        </button>
      </div>
    </header>

    <!-- Table Section -->
    <div class="flex-1 overflow-auto p-6">
      <div class="bg-surface border border-border rounded-sm overflow-hidden">
        <table class="w-full text-left text-sm">
          <thead class="bg-[#201f1f] text-gray-400 border-b border-border">
            <tr>
              <th class="px-6 py-4 font-medium uppercase tracking-wider">Product</th>
              <th class="px-6 py-4 font-medium uppercase tracking-wider">Price</th>
              <th class="px-6 py-4 font-medium uppercase tracking-wider">Stock</th>
              <th class="px-6 py-4 font-medium uppercase tracking-wider">Status</th>
              <th class="px-6 py-4 font-medium uppercase tracking-wider text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="productTableBody" class="divide-y divide-border">
            <!-- Products will be injected here via JS -->
            <tr><td colspan="5" class="p-6 text-center text-gray-500">Loading products...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Add/Edit Product Modal -->
  <div id="productModal" class="modal fixed inset-0 z-50 bg-black/80 backdrop-blur-sm items-center justify-center p-4">
    <div class="bg-surface border border-border w-full max-w-3xl max-h-[90vh] flex flex-col rounded-sm shadow-2xl relative">
      <div class="p-6 border-b border-border flex justify-between items-center">
        <h3 id="modalTitle" class="font-heading text-3xl">Add Product</h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-white">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      
      <div class="p-6 overflow-y-auto flex-1 no-scrollbar">
        <form id="productForm" class="space-y-6">
          <input type="hidden" id="productId">
          
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label>Name</label>
              <input type="text" id="name" required oninput="generateSlug()">
            </div>
            <div>
              <label>Slug</label>
              <input type="text" id="slug" required>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label>Price (₹)</label>
              <input type="number" id="price" required>
            </div>
            <div>
              <label>Compare Price (₹) (Optional)</label>
              <input type="number" id="comparePrice">
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label>Category</label>
              <select id="category" required>
                <option value="Jerseys">Jerseys</option>
                <option value="Oversized Tees">Oversized Tees</option>
                <option value="Bottoms">Bottoms</option>
                <option value="Accessories">Accessories</option>
              </select>
            </div>
            <div>
              <label>Stock</label>
              <input type="number" id="stock" required value="0">
            </div>
          </div>

          <div>
            <label>Sizes (Comma separated, e.g. S, M, L, XL)</label>
            <input type="text" id="sizes" value="S, M, L, XL" required>
          </div>

          <!-- Cloudinary Image Upload -->
          <div>
            <label>Images</label>
            <div class="border-2 border-dashed border-border rounded p-6 text-center hover:border-white transition-colors cursor-pointer relative">
              <input type="file" id="imageInput" multiple class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*" onchange="handleImageUpload(event)">
              <span class="material-symbols-outlined text-4xl text-gray-500 mb-2">cloud_upload</span>
              <p class="text-sm text-gray-400" id="uploadText">Click to upload via Cloudinary</p>
            </div>
            <div id="imagePreviewContainer" class="flex gap-2 mt-4 flex-wrap"></div>
            <!-- Hidden input to store image URLs -->
            <input type="hidden" id="imageUrls">
          </div>

          <div class="grid grid-cols-3 gap-4">
            <div class="flex items-center gap-2">
              <input type="checkbox" id="featured" class="w-4 h-4 rounded border-gray-600 bg-gray-700">
              <label for="featured" class="mb-0 normal-case tracking-normal">Featured</label>
            </div>
            <div class="flex items-center gap-2">
              <input type="checkbox" id="newArrival" class="w-4 h-4 rounded border-gray-600 bg-gray-700">
              <label for="newArrival" class="mb-0 normal-case tracking-normal">New Arrival</label>
            </div>
            <div>
              <label>Status</label>
              <select id="status">
                <option value="active">Active</option>
                <option value="draft">Draft</option>
              </select>
            </div>
          </div>
        </form>
      </div>

      <div class="p-6 border-t border-border flex justify-end gap-3">
        <button onclick="closeModal()" class="px-6 py-2 border border-border text-white hover:bg-gray-800 rounded-sm font-semibold uppercase text-sm tracking-wider">Cancel</button>
        <button onclick="saveProduct()" id="saveBtn" class="px-6 py-2 bg-accent text-white hover:bg-red-600 rounded-sm font-semibold uppercase text-sm tracking-wider">Save Product</button>
      </div>
    </div>
  </div>

  <script>
    // --- Cloudinary Config ---
    // User needs to update these values
    const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/upload';
    const CLOUDINARY_UPLOAD_PRESET = 'YOUR_UPLOAD_PRESET';
    
    let uploadedImages = [];

    // --- Utility Functions ---
    function generateSlug() {
      const name = document.getElementById('name').value;
      const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
      document.getElementById('slug').value = slug;
    }

    function openModal(product = null) {
      document.getElementById('productModal').classList.add('active');
      document.getElementById('productForm').reset();
      document.getElementById('imagePreviewContainer').innerHTML = '';
      uploadedImages = [];
      document.getElementById('imageUrls').value = '';

      if (product) {
        document.getElementById('modalTitle').innerText = 'Edit Product';
        document.getElementById('productId').value = product.id;
        document.getElementById('name').value = product.name;
        document.getElementById('slug').value = product.slug;
        document.getElementById('price').value = product.price;
        document.getElementById('comparePrice').value = product.compare_price || '';
        document.getElementById('category').value = product.category;
        document.getElementById('stock').value = product.stock;
        document.getElementById('sizes').value = product.sizes.join(', ');
        document.getElementById('featured').checked = product.featured;
        document.getElementById('newArrival').checked = product.new_arrival;
        document.getElementById('status').value = product.status;
        
        // Load images
        if (product.images && product.images.length > 0) {
          uploadedImages = [...product.images];
          renderImagePreviews();
        }
      } else {
        document.getElementById('modalTitle').innerText = 'Add Product';
        document.getElementById('productId').value = '';
      }
    }

    function closeModal() {
      document.getElementById('productModal').classList.remove('active');
    }

    // --- Cloudinary Upload Logic ---
    async function handleImageUpload(event) {
      const files = event.target.files;
      if (!files.length) return;
      
      const uploadText = document.getElementById('uploadText');
      uploadText.innerText = 'Uploading...';

      for (const file of files) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

        try {
          const res = await fetch(CLOUDINARY_URL, {
            method: 'POST',
            body: formData
          });
          const data = await res.json();
          if (data.secure_url) {
            uploadedImages.push(data.secure_url);
          } else {
            console.error('Cloudinary Error:', data);
            alert('Upload failed. Check Cloudinary settings in code.');
          }
        } catch (error) {
          console.error('Upload Error:', error);
          alert('Upload failed. Make sure you set your Cloudinary Cloud Name and Upload Preset in admin.html');
        }
      }
      
      uploadText.innerText = 'Click to upload via Cloudinary';
      renderImagePreviews();
      event.target.value = ''; // Reset input
    }

    function renderImagePreviews() {
      const container = document.getElementById('imagePreviewContainer');
      container.innerHTML = '';
      document.getElementById('imageUrls').value = JSON.stringify(uploadedImages);

      uploadedImages.forEach((url, index) => {
        const div = document.createElement('div');
        div.className = 'relative w-20 h-24 border border-border group';
        div.innerHTML = `
          <img src="${url}" class="w-full h-full object-cover">
          <button type="button" onclick="removeImage(${index})" class="absolute top-1 right-1 bg-black/50 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <span class="material-symbols-outlined text-xs">close</span>
          </button>
        `;
        container.appendChild(div);
      });
    }

    function removeImage(index) {
      uploadedImages.splice(index, 1);
      renderImagePreviews();
    }

    // --- Supabase CRUD Logic ---
    async function loadProducts() {
      const tbody = document.getElementById('productTableBody');
      const { data, error } = await supabase.from('products').select('*').order('created_at', { ascending: false });

      if (error) {
        tbody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-red-500">Error loading products: ${error.message}</td></tr>`;
        return;
      }

      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-gray-500">No products found. Add one!</td></tr>`;
        return;
      }

      tbody.innerHTML = '';
      data.forEach(p => {
        // Just store the whole object in a global map or pass via JSON string
        const tr = document.createElement('tr');
        tr.className = "hover:bg-[#201f1f] transition-colors";
        
        const img = p.images && p.images[0] ? `<img src="${p.images[0]}" class="w-10 h-12 object-cover rounded-sm">` : '<div class="w-10 h-12 bg-gray-800 rounded-sm"></div>';
        
        const statusBadge = p.status === 'active' 
          ? `<span class="bg-green-900 text-green-300 text-xs px-2 py-1 rounded">Active</span>`
          : `<span class="bg-gray-700 text-gray-300 text-xs px-2 py-1 rounded">Draft</span>`;

        tr.innerHTML = `
          <td class="px-6 py-4 flex items-center gap-4">
            ${img}
            <div>
              <p class="font-bold text-white uppercase">${p.name}</p>
              <p class="text-xs text-gray-500">${p.category}</p>
            </div>
          </td>
          <td class="px-6 py-4 font-bold text-white">₹${p.price}</td>
          <td class="px-6 py-4">${p.stock}</td>
          <td class="px-6 py-4">${statusBadge}</td>
          <td class="px-6 py-4 text-right">
            <button onclick='openEdit(${JSON.stringify(p).replace(/'/g, "&#39;")})' class="text-blue-400 hover:text-blue-300 mr-3">Edit</button>
            <button onclick="deleteProduct('${p.id}')" class="text-red-400 hover:text-red-300">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Helper for onclick inline
    window.openEdit = function(productStr) {
      openModal(productStr);
    }

    async function saveProduct() {
      const id = document.getElementById('productId').value;
      const btn = document.getElementById('saveBtn');
      btn.innerText = 'Saving...';
      btn.disabled = true;

      const productData = {
        name: document.getElementById('name').value,
        slug: document.getElementById('slug').value,
        price: parseFloat(document.getElementById('price').value),
        compare_price: document.getElementById('comparePrice').value ? parseFloat(document.getElementById('comparePrice').value) : null,
        category: document.getElementById('category').value,
        sizes: document.getElementById('sizes').value.split(',').map(s => s.trim()),
        stock: parseInt(document.getElementById('stock').value),
        images: uploadedImages,
        featured: document.getElementById('featured').checked,
        new_arrival: document.getElementById('newArrival').checked,
        status: document.getElementById('status').value
      };

      let error;
      if (id) {
        const res = await supabase.from('products').update(productData).eq('id', id);
        error = res.error;
      } else {
        const res = await supabase.from('products').insert([productData]);
        error = res.error;
      }

      btn.innerText = 'Save Product';
      btn.disabled = false;

      if (error) {
        alert('Error saving product: ' + error.message);
      } else {
        closeModal();
        loadProducts();
      }
    }

    async function deleteProduct(id) {
      if (confirm('Are you sure you want to delete this product?')) {
        const { error } = await supabase.from('products').delete().eq('id', id);
        if (error) {
          alert('Error deleting product: ' + error.message);
        } else {
          loadProducts();
        }
      }
    }

    // --- Auth Logic ---
    async function checkSession() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        document.getElementById('loginOverlay').classList.remove('active');
        loadProducts();
      } else {
        document.getElementById('loginOverlay').classList.add('active');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      
      btn.innerText = 'Logging in...';
      btn.disabled = true;
      err.classList.add('hidden');

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      
      if (error) {
        err.innerText = error.message;
        err.classList.remove('hidden');
        btn.innerText = 'Login';
        btn.disabled = false;
      } else {
        checkSession();
      }
    }

    async function handleLogout() {
      await supabase.auth.signOut();
      checkSession();
    }

    // Init
    checkSession();

  </script>
</body>
</html>
